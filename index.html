<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QSP Model Intelligence — PubMed Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #0f0f0f;
  --ink2:      #3a3a3a;
  --ink3:      #6b6b6b;
  --ink4:      #9a9a9a;
  --rule:      #d8d8d4;
  --rule2:     #eeede9;
  --paper:     #fafaf8;
  --paper2:    #f3f2ee;
  --paper3:    #ebe9e3;
  --accent:    #1a1a1a;
  --red:       #b5271a;
  --blue-ink:  #1b3a6b;
  --green-ink: #1a4a2e;
  --gold:      #8a6a1a;
  --serif:     'Playfair Display', Georgia, serif;
  --sans:      'IBM Plex Sans', 'Helvetica Neue', sans-serif;
  --mono:      'IBM Plex Mono', 'Courier New', monospace;
}

html { background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 13px; line-height: 1.65; -webkit-font-smoothing: antialiased; }

/* ── Masthead ─────────────────────────────────────────── */
.masthead {
  border-bottom: 2px solid var(--ink);
  padding: 0 48px;
  display: flex; align-items: stretch;
}
.masthead-left {
  padding: 20px 0;
  border-right: 1px solid var(--rule);
  padding-right: 32px;
  margin-right: 32px;
}
.pub-name {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -.01em;
  line-height: 1;
  color: var(--ink);
}
.pub-sub {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-top: 5px;
  font-family: var(--sans);
}
.masthead-center { flex: 1; display: flex; align-items: center; gap: 24px; }
.masthead-right { padding: 20px 0; display: flex; align-items: center; gap: 12px; }

.issue-info {
  font-size: 11px;
  color: var(--ink3);
  font-family: var(--mono);
  letter-spacing: .04em;
}

.search-field {
  display: flex; align-items: center; gap: 0;
  border: 1px solid var(--rule);
  background: white;
  height: 34px;
}
.search-field input {
  border: none; outline: none;
  padding: 0 14px;
  font-size: 12px;
  font-family: var(--sans);
  color: var(--ink);
  background: transparent;
  width: 260px;
}
.search-field input::placeholder { color: var(--ink4); }
.search-field button {
  height: 34px; width: 34px;
  background: var(--ink); border: none;
  color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.search-field button:hover { background: var(--ink2); }

.refresh-btn {
  height: 34px; padding: 0 18px;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink3);
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: .06em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; gap: 7px;
  transition: all .15s;
}
.refresh-btn:hover { border-color: var(--ink); color: var(--ink); }
.refresh-btn.spinning svg { animation: rot .8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }

/* ── Section nav ─────────────────────────────────────── */
.section-nav {
  border-bottom: 1px solid var(--rule);
  padding: 0 48px;
  display: flex; align-items: center; gap: 0;
  overflow-x: auto;
  background: white;
}
.section-nav::-webkit-scrollbar { height: 0; }
.nav-item {
  padding: 13px 20px 11px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .15s;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--sans);
}
.nav-item:hover { color: var(--ink); }
.nav-item.active { color: var(--ink); border-bottom-color: var(--ink); }
.nav-count {
  display: inline-block;
  font-size: 10px;
  color: var(--ink4);
  font-family: var(--mono);
  margin-left: 5px;
}
.nav-item.active .nav-count { color: var(--ink3); }

/* ── Body layout ─────────────────────────────────────── */
.body-wrap {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 112px);
}

/* ── Left rail ───────────────────────────────────────── */
.rail {
  border-right: 1px solid var(--rule);
  padding: 28px 0;
  background: white;
}
.rail-section { margin-bottom: 28px; }
.rail-head {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--ink4);
  padding: 0 24px 10px;
  border-bottom: 1px solid var(--rule2);
  margin-bottom: 6px;
  font-family: var(--mono);
}
.rail-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 24px;
  font-size: 12px;
  color: var(--ink2);
  cursor: pointer;
  background: none; border: none;
  width: 100%; text-align: left;
  transition: all .12s;
  font-family: var(--sans);
  gap: 8px;
}
.rail-item:hover { background: var(--paper2); color: var(--ink); }
.rail-item.active { background: var(--ink); color: white; }
.rail-item .label { display: flex; align-items: center; gap: 8px; flex: 1; }
.rail-item .swatch { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.rail-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink4);
}
.rail-item.active .rail-count { color: rgba(255,255,255,.5); }

.chk-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 24px;
  font-size: 12px;
  color: var(--ink2);
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.chk-item:hover { background: var(--paper2); }
.chk-box {
  width: 13px; height: 13px;
  border: 1px solid var(--rule);
  background: white;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 9px;
  transition: all .12s;
}
.chk-item.on .chk-box { background: var(--ink); border-color: var(--ink); color: white; }
.chk-item.on { color: var(--ink); }

/* Subscribe */
.sub-panel {
  margin: 0 16px;
  padding: 16px;
  border: 1px solid var(--rule);
  background: var(--paper2);
}
.sub-panel p {
  font-size: 11px;
  color: var(--ink3);
  line-height: 1.6;
  margin-bottom: 12px;
}
.sub-panel input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--rule);
  background: white;
  font-size: 11px;
  font-family: var(--sans);
  color: var(--ink);
  outline: none;
  margin-bottom: 8px;
  transition: border-color .15s;
}
.sub-panel input:focus { border-color: var(--ink); }
.sub-panel button {
  width: 100%;
  padding: 8px;
  background: var(--ink);
  border: none;
  color: white;
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .15s;
}
.sub-panel button:hover { background: var(--ink2); }
.sub-st { font-size: 10px; color: var(--green-ink); margin-top: 6px; font-family: var(--mono); min-height: 14px; }

/* ── Content area ────────────────────────────────────── */
.content { padding: 0; }

/* Status strip */
.status-strip {
  border-bottom: 1px solid var(--rule2);
  padding: 10px 36px;
  display: flex; align-items: center; gap: 20px;
  background: var(--paper2);
}
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green-ink); animation: blink 2.5s infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.status-text { font-size: 11px; color: var(--ink3); font-family: var(--mono); }
.status-divider { width: 1px; height: 12px; background: var(--rule); }
#st-n { font-size: 11px; color: var(--ink2); font-family: var(--mono); font-weight: 400; }
#st-d { font-size: 11px; color: var(--ink4); font-family: var(--mono); }
#last-upd { font-size: 11px; color: var(--ink4); font-family: var(--mono); }

/* Articles list */
#grid { }

.article-row {
  border-bottom: 1px solid var(--rule2);
  padding: 20px 36px;
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 0 20px;
  align-items: start;
  transition: background .12s;
  animation: slideIn .2s ease;
  cursor: default;
}
.article-row:hover { background: #faf9f7; }
.article-row.new-row { border-left: 2px solid var(--ink); }
@keyframes slideIn { from { opacity:0; transform: translateY(3px); } to { opacity:1; transform:none; } }

.art-index {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink4);
  padding-top: 3px;
  letter-spacing: .04em;
}

.art-body {}

.art-tags {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 7px; flex-wrap: wrap;
}
.art-tag {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  padding: 2px 7px;
  font-family: var(--mono);
  border: 1px solid currentColor;
}
.tag-oncology   { color: var(--red); }
.tag-autoimmune { color: #6b3fa0; }
.tag-metabolic  { color: var(--gold); }
.tag-cardio     { color: var(--blue-ink); }
.tag-neuro      { color: #2a6b6b; }
.tag-renal      { color: var(--green-ink); }
.tag-infectious { color: #8a3a6b; }
.tag-other      { color: var(--ink3); }
.tag-new        { color: var(--ink); background: var(--ink); color: white; border-color: var(--ink); }
.tag-code       { color: var(--blue-ink); }
.tag-review     { color: var(--ink4); }

.art-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.4;
  margin-bottom: 7px;
  letter-spacing: -.01em;
}
.art-title a { color: inherit; text-decoration: none; }
.art-title a:hover { color: var(--ink2); text-decoration: underline; text-decoration-thickness: 1px; }

.art-meta {
  display: flex; align-items: center; gap: 14px;
  font-size: 11px; color: var(--ink3); font-family: var(--mono);
}
.art-meta a { color: var(--blue-ink); text-decoration: none; }
.art-meta a:hover { text-decoration: underline; }
.meta-sep { color: var(--rule); }

.art-badges {
  display: flex; flex-direction: column; gap: 5px;
  align-items: flex-end; padding-top: 3px;
}
.badge {
  font-size: 9px;
  font-family: var(--mono);
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 3px 8px;
  white-space: nowrap;
}
.b-easy   { border: 1px solid var(--green-ink); color: var(--green-ink); }
.b-med    { border: 1px solid var(--gold);      color: var(--gold); }
.b-hard   { border: 1px solid var(--red);       color: var(--red); }
.b-type   { border: 1px solid var(--rule);      color: var(--ink3); }

/* State boxes */
.state-box {
  padding: 80px 36px;
  text-align: center;
  color: var(--ink3);
  font-family: var(--mono);
  font-size: 12px;
}
.loader {
  display: inline-block;
  width: 24px; height: 24px;
  border: 1px solid var(--rule);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: rot .7s linear infinite;
  margin-bottom: 16px;
}
.prog-wrap { width: 160px; height: 1px; background: var(--rule); margin: 14px auto 0; overflow: hidden; }
.prog-bar { height: 100%; background: var(--ink); width: 0; transition: width .4s ease; }

/* Pagination */
.pager {
  padding: 24px 36px;
  border-top: 1px solid var(--rule2);
  display: flex; align-items: center; gap: 4px;
}
.pg-btn {
  height: 30px; min-width: 30px; padding: 0 10px;
  border: 1px solid var(--rule);
  background: white;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--ink2);
  cursor: pointer;
  transition: all .12s;
}
.pg-btn:hover:not(:disabled) { border-color: var(--ink); color: var(--ink); background: var(--paper2); }
.pg-btn:disabled { opacity: .3; cursor: default; }
.pg-btn.current { background: var(--ink); color: white; border-color: var(--ink); }
.pg-info { font-size: 11px; color: var(--ink4); font-family: var(--mono); margin-left: 12px; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--ink); color: white;
  padding: 12px 18px;
  font-size: 11px; font-family: var(--mono);
  letter-spacing: .04em;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
  z-index: 999;
  max-width: 320px;
}
.toast.on { opacity: 1; }

@media(max-width:760px) {
  .masthead { padding: 0 16px; flex-wrap: wrap; }
  .body-wrap { grid-template-columns: 1fr; }
  .rail { border-right: none; border-bottom: 1px solid var(--rule); padding: 16px 0; }
  .content { }
  .article-row { grid-template-columns: 40px 1fr; padding: 16px; }
  .art-badges { display: none; }
  .section-nav { padding: 0 16px; }
  .status-strip { padding: 10px 16px; }
}
</style>
</head>
<body>

<!-- Masthead -->
<header class="masthead">
  <div class="masthead-left">
    <div class="pub-name">QSP Intelligence</div>
    <div class="pub-sub">Model Library · PubMed</div>
  </div>
  <div class="masthead-center">
    <div class="search-field">
      <input type="text" id="q" placeholder="Search titles, targets, journals…" oninput="doSearch()">
      <button>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
    <button class="refresh-btn" id="rbtn" onclick="load(true)">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
      Refresh
    </button>
  </div>
  <div class="masthead-right">
    <span class="issue-info" id="last-upd">Connecting…</span>
  </div>
</header>

<!-- Section nav (disease areas) -->
<nav class="section-nav" id="section-nav">
  <button class="nav-item active" data-area="all" onclick="setArea('all')">All <span class="nav-count" id="c-all">—</span></button>
  <button class="nav-item" data-area="oncology"   onclick="setArea('oncology')">  Oncology   <span class="nav-count" id="c-oncology">—</span></button>
  <button class="nav-item" data-area="autoimmune" onclick="setArea('autoimmune')">Autoimmune <span class="nav-count" id="c-autoimmune">—</span></button>
  <button class="nav-item" data-area="metabolic"  onclick="setArea('metabolic')"> Metabolic  <span class="nav-count" id="c-metabolic">—</span></button>
  <button class="nav-item" data-area="cardio"     onclick="setArea('cardio')">    Cardio     <span class="nav-count" id="c-cardio">—</span></button>
  <button class="nav-item" data-area="neuro"      onclick="setArea('neuro')">     Neuro      <span class="nav-count" id="c-neuro">—</span></button>
  <button class="nav-item" data-area="renal"      onclick="setArea('renal')">     Renal      <span class="nav-count" id="c-renal">—</span></button>
  <button class="nav-item" data-area="infectious" onclick="setArea('infectious')">Infectious <span class="nav-count" id="c-infectious">—</span></button>
  <button class="nav-item" data-area="other"      onclick="setArea('other')">     Other      <span class="nav-count" id="c-other">—</span></button>
</nav>

<div class="body-wrap">

  <!-- Left rail -->
  <aside class="rail">
    <div class="rail-section">
      <div class="rail-head">Publication Type</div>
      <label class="chk-item on" id="k-original"  onclick="toggleType('original')"> <span class="chk-box">✓</span>Original model</label>
      <label class="chk-item on" id="k-extension" onclick="toggleType('extension')"><span class="chk-box">✓</span>Extension / application</label>
      <label class="chk-item"    id="k-review"    onclick="toggleType('review')">   <span class="chk-box"> </span>Review (hidden)</label>
    </div>

    <div class="rail-section">
      <div class="rail-head">Filter</div>
      <label class="chk-item" id="k-code"   onclick="toggleX('code')">  <span class="chk-box"> </span>Code available</label>
      <label class="chk-item" id="k-recent" onclick="toggleX('recent')"><span class="chk-box"> </span>Last 2 weeks</label>
    </div>

    <div class="rail-section">
      <div class="rail-head">Difficulty</div>
      <label class="chk-item on" id="k-easy"   onclick="toggleDiff('easy')">  <span class="chk-box">✓</span>Easy to reproduce</label>
      <label class="chk-item on" id="k-medium" onclick="toggleDiff('medium')"><span class="chk-box">✓</span>Moderate</label>
      <label class="chk-item on" id="k-hard"   onclick="toggleDiff('hard')">  <span class="chk-box">✓</span>Complex</label>
    </div>

    <div class="rail-section" style="margin-top:auto; padding-top:20px;">
      <div class="rail-head">Daily Alert</div>
      <div class="sub-panel">
        <p>Subscribe to receive email alerts when new QSP models are indexed in PubMed.</p>
        <input type="email" id="sub-em" placeholder="your@institution.edu">
        <button onclick="subscribe()">Subscribe</button>
        <div class="sub-st" id="sub-st"></div>
      </div>
    </div>
  </aside>

  <!-- Content -->
  <main class="content">
    <div class="status-strip">
      <span class="status-dot"></span>
      <span class="status-text" id="st-txt">Retrieving from PubMed…</span>
      <span class="status-divider"></span>
      <span id="st-n">—</span>
      <span class="status-divider"></span>
      <span id="st-d">—</span>
    </div>

    <div id="grid">
      <div class="state-box">
        <div class="loader"></div>
        <div>Retrieving QSP models from PubMed…</div>
        <div class="prog-wrap"><div class="prog-bar" id="prog-f"></div></div>
      </div>
    </div>

    <div class="pager" id="pager" style="display:none">
      <button class="pg-btn" id="pb-prev" onclick="flip(-1)" disabled>←</button>
      <span id="pg-btns"></span>
      <button class="pg-btn" id="pb-next" onclick="flip(1)">→</button>
      <span class="pg-info" id="pg-inf"></span>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// Config
// ══════════════════════════════════════════════
const PAGE_SIZE = 20;
const CACHE_MS  = 2 * 3600e3;
const WORKER    = 'https://calm-king-40bf.junnhong0324.workers.dev';
const QUERIES   = [
  '"quantitative systems pharmacology"[Title/Abstract] AND "model"[Title/Abstract]',
  '"quantitative systems pharmacology"[Title/Abstract] AND "virtual patient"[Title/Abstract]',
  '"quantitative systems pharmacology"[Title/Abstract] AND "drug development"[Title/Abstract]',
  '"systems pharmacology" AND "mechanistic model"[Title/Abstract] AND "pharmacodynamics"[Title/Abstract]'
];

// ══════════════════════════════════════════════
// PubMed — full pagination, all results
// ══════════════════════════════════════════════
async function searchPMIDs(query) {
  const allIds = [];
  const retmax = 200;
  // First call to get total count
  const p0 = new URLSearchParams({ db:'pubmed', term:query, retmax, retmode:'json', sort:'pub_date', retstart:0 });
  const r0 = await fetch(`${WORKER}/esearch.fcgi?${p0}`);
  const d0 = await r0.json();
  allIds.push(...(d0?.esearchresult?.idlist || []));
  const total = parseInt(d0?.esearchresult?.count || '0');
  // Paginate through remaining results
  let retstart = retmax;
  while (retstart < total && retstart < 800) {
    const p = new URLSearchParams({ db:'pubmed', term:query, retmax, retmode:'json', sort:'pub_date', retstart });
    const r = await fetch(`${WORKER}/esearch.fcgi?${p}`);
    const d = await r.json();
    allIds.push(...(d?.esearchresult?.idlist || []));
    retstart += retmax;
  }
  return allIds;
}

async function fetchSummary(pmids) {
  if (!pmids.length) return [];
  const p = new URLSearchParams({ db:'pubmed', id:pmids.join(','), retmode:'json' });
  const r = await fetch(`${WORKER}/esummary.fcgi?${p}`);
  const d = await r.json();
  const result = d?.result || {};
  const uids = result.uids || pmids;
  return uids.map(id => result[id]).filter(a => a && a.uid);
}

// ══════════════════════════════════════════════
// Classification
// ══════════════════════════════════════════════
function classify(title, pubtype) {
  const t  = (title||'').toLowerCase();
  const pt = (Array.isArray(pubtype) ? pubtype : []).join(' ').toLowerCase();
  let type = 'original';
  if (/\breview\b|systematic review|meta-analysis|overview|landscape|perspective/.test(t) || pt.includes('review') || pt.includes('systematic')) type = 'review';
  else if (/extend|adapt|refine|update|improv|application|appl/.test(t)) type = 'extension';
  let area = 'other';
  if (/cancer|tumor|tumour|oncol|checkpoint|pd-1|pd-l1|car-t|breast|lung|leukemia|lymphoma|melanoma|hepatocellular|colorectal|immuno.*therap/.test(t)) area = 'oncology';
  else if (/rheumat|autoimmun|lupus|\bibd\b|crohn|colitis|psoriasis|multiple sclerosis|arthrit/.test(t)) area = 'autoimmune';
  else if (/nafld|nash|diabet|obesity|lipid|metabol|insulin|glucose|t2dm|fatty liver/.test(t)) area = 'metabolic';
  else if (/cardiac|heart|cardiovasc|atheroscler|hypertens|coronary|arrhythmia|pcsk9|ldl/.test(t)) area = 'cardio';
  else if (/neuro|alzheimer|parkinson|brain|\bcns\b|dopamine|serotonin|epilep|dementia|amyloid|clozapine|valproic/.test(t)) area = 'neuro';
  else if (/renal|kidney|nephro|\bckd\b/.test(t)) area = 'renal';
  else if (/covid|sars|hiv|influenza|hepatitis|infect|viral|malaria/.test(t)) area = 'infectious';
  const tagMap = [
    ['TNBC','triple.negative breast'],['NSCLC','non.small.cell lung'],
    ['IBD','inflammatory bowel'],['T2DM','type 2 diabet'],
    ['NAFLD','non.alcoholic fatty'],['NASH','\\bnash\\b'],
    ['COVID-19','covid|sars-cov'],['RA','rheumatoid arthrit'],
    ['CKD','chronic kidney'],['Alzheimer','alzheimer'],
    ['HCC','hepatocellular'],['CAR-T','car-t'],
    ['PD-1/L1','pd-1|pd-l1'],['PBPK','physiologically based'],
    ['Atherosclerosis','atheroscler'],['PCSK9','pcsk9'],
    ['Valproic Acid','valproic'],['Clozapine','clozapine'],
    ['Parkinson','parkinson'],['Epilepsy','epilep']
  ];
  let tag = 'QSP';
  for (const [lb, pat] of tagMap) { if (new RegExp(pat,'i').test(t)) { tag = lb; break; } }
  const hasCode = /github|code available|open.source|matlab|python|r package|zenodo/.test(t);
  let diff = 'medium';
  if (/whole.body|multi.scale|integrated|comprehensive/.test(t)) diff = 'hard';
  else if (/simple|minimal|two.compartment|one.compartment/.test(t)) diff = 'easy';
  return { type, area, tag, hasCode, diff };
}

function isRecent(pubdate) {
  if (!pubdate) return false;
  const s = String(pubdate);
  const y = parseInt(s.slice(0,4));
  const mo = s.slice(5,8);
  const m = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11}[mo] ?? 0;
  return (Date.now() - new Date(y, m, 1)) < 14 * 24 * 3600e3;
}

// ══════════════════════════════════════════════
// State
// ══════════════════════════════════════════════
let all = [], filtered = [];
let curArea = 'all';
let types = { original:true, extension:true, review:false };
let extras = { code:false, recent:false };
let diffs  = { easy:true, medium:true, hard:true };
let qStr = '';
let pg = 1;

// ══════════════════════════════════════════════
// Load
// ══════════════════════════════════════════════
async function load(force) {
  if (!force) {
    const c = getCache();
    if (c) { all = c; afterLoad('cache'); return; }
  }
  document.getElementById('rbtn').classList.add('spinning');
  setStat('Retrieving from PubMed…','—','—');
  showSpinner();
  setP(8);

  try {
    const sets = await Promise.all(QUERIES.map(searchPMIDs));
    const unique = [...new Set(sets.flat())];
    setStat(`Fetching ${unique.length} records…`,'—','—');
    setP(40);

    const batches = [];
    for (let i=0; i<unique.length; i+=20) batches.push(unique.slice(i,i+20));
    const rows = (await Promise.all(batches.map(fetchSummary))).flat();
    setP(85);

    const seen = new Set();
    all = rows
      .filter(s => { if (seen.has(s.uid)) return false; seen.add(s.uid); return true; })
      .map(s => {
        const c = classify(s.title, s.pubtype);
        return {
          pmid: s.uid,
          title: s.title || 'Untitled',
          journal: s.fulljournalname || s.source || '',
          year: String(s.pubdate||'').slice(0,4),
          pubdate: s.pubdate||'',
          doi: (s.elocationid||'').replace('doi: ','').trim(),
          area: c.area, type: c.type, tag: c.tag,
          hasCode: c.hasCode, diff: c.diff,
          recent: isRecent(s.pubdate)
        };
      })
      .sort((a,b) => {
        if (a.recent && !b.recent) return -1;
        if (!a.recent && b.recent) return 1;
        return (b.year||0) - (a.year||0);
      });

    setP(100);
    saveCache(all);
    afterLoad('live');
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="state-box">Error: ${e.message}<br><small style="color:var(--ink4);margin-top:8px;display:block">Open browser console (F12) for details</small></div>`;
    setStat('Error','—','—');
  }
  document.getElementById('rbtn').classList.remove('spinning');
}

function afterLoad(src) {
  updateCounts(); applyFilter();
  const n = new Date();
  const ts = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('last-upd').textContent = `Updated ${ts}${src==='cache'?' (cached)':''}`;
  if (src==='cache') toast('Loaded from cache (< 2 hours old)');
}

// ══════════════════════════════════════════════
// Filter & render
// ══════════════════════════════════════════════
function applyFilter() {
  const q = qStr.toLowerCase();
  filtered = all.filter(a => {
    if (curArea !== 'all' && a.area !== curArea) return false;
    if (a.type === 'review'    && !types.review)    return false;
    if (a.type === 'original'  && !types.original)  return false;
    if (a.type === 'extension' && !types.extension) return false;
    if (extras.code   && !a.hasCode) return false;
    if (extras.recent && !a.recent)  return false;
    if (!diffs[a.diff]) return false;
    if (q && !a.title.toLowerCase().includes(q) &&
        !a.journal.toLowerCase().includes(q) &&
        !a.tag.toLowerCase().includes(q)) return false;
    return true;
  });
  pg = 1; render();
  setStat(
    `${filtered.length} models ${curArea !== 'all' ? '· ' + curArea : ''}`,
    `${filtered.length} of ${all.length}`,
    new Date().toISOString().slice(0,10)
  );
}

function render() {
  const grid  = document.getElementById('grid');
  const start = (pg-1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (!slice.length) {
    grid.innerHTML = '<div class="state-box">No records match the current filters.</div>';
    document.getElementById('pager').style.display = 'none';
    return;
  }
  grid.innerHTML = slice.map((a,i) => mkRow(a, start+i+1)).join('');
  const pager = document.getElementById('pager');
  if (total > 1) {
    pager.style.display = 'flex';
    document.getElementById('pb-prev').disabled = (pg===1);
    document.getElementById('pb-next').disabled = (pg===total);
    document.getElementById('pg-inf').textContent = `Page ${pg} of ${total}`;
    // Page number buttons (show 5 around current)
    const btns = document.getElementById('pg-btns');
    let html = '';
    const lo = Math.max(1, pg-2), hi = Math.min(total, pg+2);
    if (lo > 1) html += `<button class="pg-btn" onclick="goPage(1)">1</button>`;
    if (lo > 2) html += `<span style="padding:0 4px;color:var(--ink4);font-family:var(--mono);font-size:11px">…</span>`;
    for (let i=lo; i<=hi; i++) html += `<button class="pg-btn${i===pg?' current':''}" onclick="goPage(${i})">${i}</button>`;
    if (hi < total-1) html += `<span style="padding:0 4px;color:var(--ink4);font-family:var(--mono);font-size:11px">…</span>`;
    if (hi < total) html += `<button class="pg-btn" onclick="goPage(${total})">${total}</button>`;
    btns.innerHTML = html;
  } else { pager.style.display = 'none'; }
}

function mkRow(a, idx) {
  const diffClass = {easy:'b-easy', medium:'b-med', hard:'b-hard'}[a.diff] || 'b-med';
  const diffLabel = {easy:'Reproducible', medium:'Moderate', hard:'Complex'}[a.diff] || 'Moderate';
  const typeLabel = {original:'Original', extension:'Extension', review:'Review'}[a.type] || a.type;
  const doiLink = a.doi
    ? `<a href="https://doi.org/${a.doi}" target="_blank">${a.doi.substring(0,46)}</a>`
    : `PMID ${a.pmid}`;
  return `<div class="article-row${a.recent?' new-row':''}">
    <div class="art-index">${String(idx).padStart(3,'0')}</div>
    <div class="art-body">
      <div class="art-tags">
        ${a.recent ? '<span class="art-tag tag-new">New</span>' : ''}
        <span class="art-tag tag-${a.area}">${a.tag}</span>
        ${a.type === 'review' ? '<span class="art-tag tag-review">Review</span>' : ''}
        ${a.hasCode ? '<span class="art-tag tag-code">Code</span>' : ''}
      </div>
      <div class="art-title">
        <a href="https://pubmed.ncbi.nlm.nih.gov/${a.pmid}/" target="_blank">${a.title}</a>
      </div>
      <div class="art-meta">
        <span>${a.journal.substring(0,40)}</span>
        <span class="meta-sep">·</span>
        <span>${a.year}</span>
        <span class="meta-sep">·</span>
        <span>${doiLink}</span>
      </div>
    </div>
    <div class="art-badges">
      <span class="badge ${diffClass}">${diffLabel}</span>
      <span class="badge b-type">${typeLabel}</span>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// UI controls
// ══════════════════════════════════════════════
function setArea(a) {
  curArea = a;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-area="${a}"]`)?.classList.add('active');
  applyFilter();
}
function toggleType(t) {
  types[t] = !types[t];
  const el = document.getElementById('k-'+t);
  el.classList.toggle('on', types[t]);
  el.querySelector('.chk-box').textContent = types[t] ? '✓' : ' ';
  applyFilter();
}
function toggleX(k) {
  extras[k] = !extras[k];
  const el = document.getElementById('k-'+k);
  el.classList.toggle('on', extras[k]);
  el.querySelector('.chk-box').textContent = extras[k] ? '✓' : ' ';
  applyFilter();
}
function toggleDiff(k) {
  diffs[k] = !diffs[k];
  const el = document.getElementById('k-'+k);
  el.classList.toggle('on', diffs[k]);
  el.querySelector('.chk-box').textContent = diffs[k] ? '✓' : ' ';
  applyFilter();
}
function doSearch() { qStr = document.getElementById('q').value; applyFilter(); }
function flip(d) { goPage(pg + d); }
function goPage(n) {
  pg = Math.max(1, Math.min(Math.ceil(filtered.length/PAGE_SIZE), n));
  render(); window.scrollTo(0,0);
}
function setStat(t,n,d) {
  document.getElementById('st-txt').textContent = t;
  document.getElementById('st-n').textContent   = n;
  document.getElementById('st-d').textContent   = d;
}
function updateCounts() {
  ['all','oncology','autoimmune','metabolic','cardio','neuro','renal','infectious','other'].forEach(a => {
    const el = document.getElementById('c-'+a);
    if (el) el.textContent = a==='all' ? all.length : all.filter(x=>x.area===a).length;
  });
}
function showSpinner() {
  document.getElementById('grid').innerHTML =
    '<div class="state-box"><div class="loader"></div><div>Retrieving QSP models from PubMed…</div>'
    + '<div class="prog-wrap"><div class="prog-bar" id="prog-f"></div></div></div>';
  document.getElementById('pager').style.display = 'none';
}
function setP(pct) { const el = document.getElementById('prog-f'); if(el) el.style.width = pct+'%'; }
function subscribe() {
  const em = document.getElementById('sub-em').value.trim();
  const st = document.getElementById('sub-st');
  if (!em.includes('@')) { st.textContent = 'Please enter a valid email.'; st.style.color='var(--red)'; return; }
  const subs = JSON.parse(localStorage.getItem('qsp_subs')||'[]');
  if (!subs.includes(em)) { subs.push(em); localStorage.setItem('qsp_subs', JSON.stringify(subs)); }
  st.textContent = '✓ Subscribed'; st.style.color='var(--green-ink)';
  document.getElementById('sub-em').value = '';
  toast('Subscribed. Configure GitHub Actions for daily email delivery.');
}
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), 3500);
}
function saveCache(d) {
  try { localStorage.setItem('qsp_d', JSON.stringify(d)); localStorage.setItem('qsp_t', Date.now()); } catch(e){}
}
function getCache() {
  try {
    const ts = parseInt(localStorage.getItem('qsp_t')||'0');
    if (Date.now()-ts > CACHE_MS) return null;
    const d = localStorage.getItem('qsp_d');
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}

load();
</script>
