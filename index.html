<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QSP Model Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d0f12; --bg2:#13161b; --bg3:#1a1e26;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --text:#e8eaf0; --text2:#8890a4; --text3:#555e72;
    --accent:#4ade80; --accent2:#22c55e;
    --blue:#60a5fa; --amber:#fbbf24; --coral:#f87171;
    --purple:#a78bfa; --teal:#2dd4bf; --pink:#f472b6;
    --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif;
  }
  html { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; line-height:1.6; }
  .shell { display:grid; grid-template-columns:230px 1fr; min-height:100vh; }
  .sidebar { background:var(--bg2); border-right:1px solid var(--border); padding:28px 0; position:sticky; top:0; height:100vh; overflow-y:auto; display:flex; flex-direction:column; }
  .logo { padding:0 20px 22px; border-bottom:1px solid var(--border); margin-bottom:22px; }
  .logo-mark { font-family:var(--mono); font-size:10px; color:var(--accent); letter-spacing:.12em; text-transform:uppercase; margin-bottom:3px; }
  .logo h1 { font-size:17px; font-weight:600; letter-spacing:-.03em; }
  .logo p { font-size:11px; color:var(--text3); margin-top:3px; font-family:var(--mono); }
  .sb-sec { padding:0 20px; margin-bottom:22px; }
  .sb-label { font-size:10px; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); margin-bottom:7px; font-family:var(--mono); }
  .filter-btn { display:flex; align-items:center; justify-content:space-between; width:100%; padding:7px 10px; background:transparent; border:none; border-radius:6px; color:var(--text2); font-size:13px; font-family:var(--sans); cursor:pointer; transition:all .15s; text-align:left; margin-bottom:2px; }
  .filter-btn:hover { background:var(--bg3); color:var(--text); }
  .filter-btn.active { background:rgba(74,222,128,.1); color:var(--accent); }
  .filter-btn .cnt { font-family:var(--mono); font-size:11px; background:var(--bg3); padding:1px 7px; border-radius:10px; color:var(--text3); }
  .filter-btn.active .cnt { background:rgba(74,222,128,.15); color:var(--accent2); }
  .dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:8px; }
  .chk-row { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:6px; cursor:pointer; color:var(--text2); font-size:13px; transition:all .15s; margin-bottom:2px; user-select:none; }
  .chk-row:hover { background:var(--bg3); color:var(--text); }
  .chk-box { width:14px; height:14px; border-radius:3px; border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:10px; transition:all .15s; }
  .chk-row.on .chk-box { background:var(--accent); border-color:var(--accent); color:#0d0f12; }
  .chk-row.on { color:var(--text); }
  .sub-box { margin:0 16px 20px; padding:14px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; }
  .sub-box p { font-size:12px; color:var(--text2); margin-bottom:10px; line-height:1.5; }
  .sub-input { width:100%; padding:8px 10px; background:var(--bg2); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-size:12px; font-family:var(--sans); outline:none; margin-bottom:8px; transition:border-color .15s; }
  .sub-input:focus { border-color:var(--accent); }
  .sub-btn { width:100%; padding:8px; background:var(--accent); border:none; border-radius:6px; color:#0d0f12; font-size:12px; font-weight:600; cursor:pointer; font-family:var(--sans); }
  .spacer { flex:1; }
  .main { padding:32px 36px; }
  .topbar { display:flex; align-items:center; gap:14px; margin-bottom:24px; flex-wrap:wrap; }
  .topbar h2 { font-size:22px; font-weight:600; letter-spacing:-.03em; flex:1; }
  .topbar h2 span { color:var(--accent); }
  .search-wrap { position:relative; }
  .search-ico { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
  .search-inp { padding:8px 14px 8px 34px; background:var(--bg2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; font-family:var(--sans); outline:none; width:220px; transition:all .15s; }
  .search-inp:focus { border-color:var(--accent); width:270px; }
  .refresh-btn { display:flex; align-items:center; gap:6px; padding:8px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:13px; cursor:pointer; transition:all .15s; font-family:var(--sans); }
  .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
  .refresh-btn.spinning svg { animation:rot .9s linear infinite; }
  @keyframes rot { to { transform:rotate(360deg); } }
  .statbar { display:flex; align-items:center; gap:14px; margin-bottom:20px; font-size:12px; color:var(--text3); font-family:var(--mono); flex-wrap:wrap; }
  .live { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .sep { color:var(--border2); }
  #grid { display:flex; flex-direction:column; gap:9px; }
  .card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px 20px; transition:border-color .2s,background .2s; animation:fade .25s ease; }
  .card:hover { border-color:var(--border2); background:var(--bg3); }
  .card.new-card { border-left:2px solid var(--accent); }
  @keyframes fade { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .card-tags { display:flex; gap:5px; flex-wrap:wrap; flex:1; }
  .card-meta { font-size:11px; color:var(--text3); font-family:var(--mono); white-space:nowrap; }
  .tag { font-size:11px; font-weight:500; padding:2px 9px; border-radius:20px; font-family:var(--mono); letter-spacing:.02em; white-space:nowrap; }
  .t-oncology   { background:rgba(248,113,113,.12); color:#f87171; border:1px solid rgba(248,113,113,.2); }
  .t-autoimmune { background:rgba(167,139,250,.12); color:#a78bfa; border:1px solid rgba(167,139,250,.2); }
  .t-metabolic  { background:rgba(251,191,36,.12);  color:#fbbf24; border:1px solid rgba(251,191,36,.2); }
  .t-cardio     { background:rgba(96,165,250,.12);  color:#60a5fa; border:1px solid rgba(96,165,250,.2); }
  .t-neuro      { background:rgba(45,212,191,.12);  color:#2dd4bf; border:1px solid rgba(45,212,191,.2); }
  .t-renal      { background:rgba(74,222,128,.12);  color:#4ade80; border:1px solid rgba(74,222,128,.2); }
  .t-infectious { background:rgba(244,114,182,.12); color:#f472b6; border:1px solid rgba(244,114,182,.2); }
  .t-other      { background:rgba(136,144,164,.12); color:#8890a4; border:1px solid rgba(136,144,164,.2); }
  .t-review     { background:rgba(136,144,164,.08); color:#555e72; border:1px solid rgba(136,144,164,.15); }
  .t-new        { background:rgba(74,222,128,.15);  color:var(--accent); border:1px solid rgba(74,222,128,.3); }
  .t-code       { background:rgba(96,165,250,.1);   color:#60a5fa; border:1px solid rgba(96,165,250,.2); }
  .card-title { font-size:14px; font-weight:500; color:var(--text); line-height:1.45; margin-bottom:8px; letter-spacing:-.01em; }
  .card-title a { color:inherit; text-decoration:none; }
  .card-title a:hover { color:var(--accent); }
  .card-bot { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .card-doi { font-size:11px; color:var(--text3); font-family:var(--mono); }
  .card-doi a { color:var(--blue); text-decoration:none; }
  .card-doi a:hover { text-decoration:underline; }
  .badge { font-size:11px; padding:2px 8px; border-radius:4px; font-family:var(--mono); font-weight:500; }
  .b-easy { background:rgba(74,222,128,.1); color:#4ade80; }
  .b-med  { background:rgba(251,191,36,.1); color:#fbbf24; }
  .b-hard { background:rgba(248,113,113,.1); color:#f87171; }
  .b-blue { background:rgba(96,165,250,.1); color:#60a5fa; }
  .state-box { text-align:center; padding:60px 20px; color:var(--text3); font-family:var(--mono); font-size:13px; }
  .spinner { width:30px; height:30px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:rot .8s linear infinite; margin:0 auto 14px; }
  .prog { width:200px; height:2px; background:var(--border); border-radius:2px; margin:12px auto 0; overflow:hidden; }
  .prog-f { height:100%; background:var(--accent); width:0; transition:width .4s ease; }
  .pager { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:26px; padding-top:18px; border-top:1px solid var(--border); }
  .pg-btn { padding:6px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--text2); font-size:12px; cursor:pointer; font-family:var(--mono); transition:all .15s; }
  .pg-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .pg-btn:disabled { opacity:.3; cursor:default; }
  .pg-info { font-size:12px; color:var(--text3); font-family:var(--mono); }
  .toast { position:fixed; bottom:20px; right:20px; background:var(--bg3); border:1px solid var(--accent); border-radius:10px; padding:11px 16px; font-size:13px; opacity:0; pointer-events:none; transition:opacity .3s; z-index:999; max-width:300px; }
  .toast.on { opacity:1; }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  @media(max-width:700px){ .shell{grid-template-columns:1fr} .sidebar{position:static;height:auto} .main{padding:20px 14px} }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">▸ QSP Tracker</div>
      <h1>Model Library</h1>
      <p id="last-upd">连接 PubMed 中…</p>
    </div>
    <div class="sb-sec">
      <div class="sb-label">疾病领域</div>
      <button class="filter-btn active" data-area="all"        onclick="setArea('all')">全部 <span class="cnt" id="c-all">—</span></button>
      <button class="filter-btn" data-area="oncology"          onclick="setArea('oncology')">  <span><span class="dot" style="background:#f87171"></span>肿瘤免疫</span>  <span class="cnt" id="c-oncology">—</span></button>
      <button class="filter-btn" data-area="autoimmune"        onclick="setArea('autoimmune')"><span><span class="dot" style="background:#a78bfa"></span>自身免疫</span>  <span class="cnt" id="c-autoimmune">—</span></button>
      <button class="filter-btn" data-area="metabolic"         onclick="setArea('metabolic')"> <span><span class="dot" style="background:#fbbf24"></span>代谢</span>      <span class="cnt" id="c-metabolic">—</span></button>
      <button class="filter-btn" data-area="cardio"            onclick="setArea('cardio')">    <span><span class="dot" style="background:#60a5fa"></span>心血管</span>    <span class="cnt" id="c-cardio">—</span></button>
      <button class="filter-btn" data-area="neuro"             onclick="setArea('neuro')">     <span><span class="dot" style="background:#2dd4bf"></span>神经系统</span>  <span class="cnt" id="c-neuro">—</span></button>
      <button class="filter-btn" data-area="renal"             onclick="setArea('renal')">     <span><span class="dot" style="background:#4ade80"></span>肾脏</span>      <span class="cnt" id="c-renal">—</span></button>
      <button class="filter-btn" data-area="infectious"        onclick="setArea('infectious')"><span><span class="dot" style="background:#f472b6"></span>感染性疾病</span><span class="cnt" id="c-infectious">—</span></button>
      <button class="filter-btn" data-area="other"             onclick="setArea('other')">     <span><span class="dot" style="background:#8890a4"></span>其他/方法论</span><span class="cnt" id="c-other">—</span></button>
    </div>
    <div class="sb-sec">
      <div class="sb-label">文献类型</div>
      <label class="chk-row on" id="k-original"  onclick="toggleType('original')"> <span class="chk-box">✓</span>原创建模</label>
      <label class="chk-row on" id="k-extension" onclick="toggleType('extension')"><span class="chk-box">✓</span>模型扩展/应用</label>
      <label class="chk-row"    id="k-review"    onclick="toggleType('review')">   <span class="chk-box"></span> 综述（默认隐藏）</label>
    </div>
    <div class="sb-sec">
      <div class="sb-label">附加筛选</div>
      <label class="chk-row" id="k-code"   onclick="toggleX('code')">  <span class="chk-box"></span>仅有代码发布</label>
      <label class="chk-row" id="k-recent" onclick="toggleX('recent')"><span class="chk-box"></span>仅近两周新增</label>
    </div>
    <div class="spacer"></div>
    <div class="sub-box">
      <p>订阅后 GitHub Actions 每天检索，有新模型时邮件通知</p>
      <input class="sub-input" type="email" id="sub-em" placeholder="your@email.com">
      <button class="sub-btn" onclick="subscribe()">订阅每日更新</button>
      <div style="font-size:11px;color:var(--accent);margin-top:6px;text-align:center;min-height:16px;font-family:var(--mono)" id="sub-st"></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2>QSP <span>模型库</span></h2>
      <div class="search-wrap">
        <svg class="search-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-inp" type="text" id="q" placeholder="搜索标题、靶点、期刊…" oninput="doSearch()">
      </div>
      <button class="refresh-btn" id="rbtn" onclick="load(true)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        刷新检索
      </button>
    </div>
    <div class="statbar">
      <span class="live"></span>
      <span id="st-txt">正在连接 PubMed…</span>
      <span class="sep">|</span><span id="st-n">—</span>
      <span class="sep">|</span><span id="st-d">—</span>
    </div>
    <div id="grid">
      <div class="state-box">
        <div class="spinner"></div>
        <div>正在从 PubMed 检索 QSP 模型…</div>
        <div class="prog"><div class="prog-f" id="prog-f"></div></div>
      </div>
    </div>
    <div class="pager" id="pager" style="display:none">
      <button class="pg-btn" id="pb-prev" onclick="flip(-1)" disabled>← 上一页</button>
      <span class="pg-info" id="pg-inf"></span>
      <button class="pg-btn" id="pb-next" onclick="flip(1)">下一页 →</button>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const PAGE_SIZE = 15;
const CACHE_MS  = 2 * 3600e3;
const WORKER = 'https://calm-king-40bf.junnhong0324.workers.dev';
const QUERIES = [
  '"quantitative systems pharmacology"[Title/Abstract] AND "model"[Title/Abstract]',
  '"quantitative systems pharmacology"[Title/Abstract] AND "virtual patient"[Title/Abstract]',
  '"quantitative systems pharmacology"[Title/Abstract] AND "drug development"[Title/Abstract]',
  '"systems pharmacology" AND "mechanistic model"[Title/Abstract] AND "pharmacodynamics"[Title/Abstract]'
];

async function searchPMIDs(query) {
  const p = new URLSearchParams({ db:'pubmed', term:query, retmax:60, retmode:'json', sort:'pub_date' });
  const r = await fetch(`${WORKER}/esearch.fcgi?${p}`);
  const d = await r.json();
  return d?.esearchresult?.idlist || [];
}

async function fetchSummary(pmids) {
  if (!pmids.length) return [];
  const p = new URLSearchParams({ db:'pubmed', id:pmids.join(','), retmode:'json' });
  const r = await fetch(`${WORKER}/esummary.fcgi?${p}`);
  const d = await r.json();
  const result = d?.result || {};
  const uids = result.uids || pmids;
  return uids.map(id => result[id]).filter(a => a && a.uid);
}

// ── Classification ───────────────────────────────────────
function classify(title, pubtype) {
  const t  = (title||'').toLowerCase();
  const pt = (Array.isArray(pubtype) ? pubtype : []).join(' ').toLowerCase();

  let type = 'original';
  if (/\breview\b|systematic review|meta-analysis|overview|landscape|perspective/.test(t) ||
      pt.includes('review') || pt.includes('systematic')) type = 'review';
  else if (/extend|adapt|refine|update|improv|application|appl/.test(t)) type = 'extension';

  let area = 'other';
  if (/cancer|tumor|tumour|oncol|checkpoint|pd-1|pd-l1|car-t|breast|lung|leukemia|lymphoma|melanoma|hepatocellular|colorectal|immuno.*therap/.test(t)) area = 'oncology';
  else if (/rheumat|autoimmun|lupus|\bibd\b|crohn|colitis|psoriasis|multiple sclerosis|arthrit/.test(t)) area = 'autoimmune';
  else if (/nafld|nash|diabet|obesity|lipid|metabol|insulin|glucose|t2dm|fatty liver/.test(t)) area = 'metabolic';
  else if (/cardiac|heart|cardiovasc|atheroscler|hypertens|coronary|arrhythmia|pcsk9|ldl/.test(t)) area = 'cardio';
  else if (/neuro|alzheimer|parkinson|brain|\bcns\b|dopamine|serotonin|epilep|dementia|amyloid|clozapine|valproic/.test(t)) area = 'neuro';
  else if (/renal|kidney|nephro|\bckd\b/.test(t)) area = 'renal';
  else if (/covid|sars|hiv|influenza|hepatitis|infect|viral|malaria/.test(t)) area = 'infectious';

  const tagMap = [
    ['TNBC','triple.negative breast'],['NSCLC','non.small.cell lung'],
    ['IBD','inflammatory bowel'],['T2DM','type 2 diabet'],
    ['NAFLD','non.alcoholic fatty'],['NASH','\\bnash\\b'],
    ['COVID-19','covid|sars-cov'],['RA','rheumatoid arthrit'],
    ['CKD','chronic kidney'],['Alzheimer','alzheimer'],
    ['HCC','hepatocellular'],['CAR-T','car-t'],
    ['PD-1/L1','pd-1|pd-l1'],['PBPK','physiologically based'],
    ['Atherosclerosis','atheroscler'],['PCSK9','pcsk9'],
    ['Valproic Acid','valproic'],['Clozapine','clozapine']
  ];
  let tag = 'QSP';
  for (const [lb, pat] of tagMap) { if (new RegExp(pat,'i').test(t)) { tag = lb; break; } }

  const hasCode = /github|code available|open.source|matlab|python|r package|zenodo/.test(t);
  let diff = 'medium';
  if (/whole.body|multi.scale|integrated|comprehensive/.test(t)) diff = 'high';
  else if (/simple|minimal|two.compartment|one.compartment/.test(t)) diff = 'low';

  return { type, area, tag, hasCode, diff };
}

function isRecent(pubdate) {
  if (!pubdate) return false;
  const s = String(pubdate);
  const y = parseInt(s.slice(0,4));
  const mo = s.slice(5,8);
  const m = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11}[mo] ?? 0;
  return (Date.now() - new Date(y, m, 1)) < 14 * 24 * 3600e3;
}

// ── State ────────────────────────────────────────────────
let all = [], filtered = [];
let curArea = 'all';
let types = { original:true, extension:true, review:false };
let extras = { code:false, recent:false };
let qStr = '';
let pg = 1;

// ── Load ─────────────────────────────────────────────────
async function load(force) {
  if (!force) {
    const c = getCache();
    if (c) { all = c; afterLoad('cache'); return; }
  }
  document.getElementById('rbtn').classList.add('spinning');
  setStat('正在检索 PubMed…','—','—');
  showSpinner();
  setP(10);

  try {
    const sets   = await Promise.all(QUERIES.map(searchPMIDs));
    const unique = [...new Set(sets.flat())];
    setStat('找到 ' + unique.length + ' 篇候选，获取详情…','—','—');
    setP(40);

    const batches = [];
    for (let i=0; i<unique.length; i+=20) batches.push(unique.slice(i,i+20));
    const rows = (await Promise.all(batches.map(fetchSummary))).flat();
    setP(80);

    const seen = new Set();
    all = rows
      .filter(s => { if (seen.has(s.uid)) return false; seen.add(s.uid); return true; })
      .map(s => {
        const c = classify(s.title, s.pubtype);
        return {
          pmid: s.uid,
          title: s.title || 'Untitled',
          journal: s.fulljournalname || s.source || '',
          year: String(s.pubdate||'').slice(0,4),
          pubdate: s.pubdate||'',
          doi: (s.elocationid||'').replace('doi: ','').trim(),
          area: c.area, type: c.type, tag: c.tag,
          hasCode: c.hasCode, diff: c.diff,
          recent: isRecent(s.pubdate)
        };
      })
      .sort((a,b) => {
        if (a.recent && !b.recent) return -1;
        if (!a.recent && b.recent) return 1;
        return (b.year||0) - (a.year||0);
      });

    setP(100);
    saveCache(all);
    afterLoad('live');
  } catch(e) {
    document.getElementById('grid').innerHTML =
      '<div class="state-box">⚠ 检索失败: ' + e.message +
      '<br><br><span style="font-size:11px;color:var(--text3)">请按 F12 → Console 查看详细错误</span></div>';
    setStat('检索失败','—','—');
  }
  document.getElementById('rbtn').classList.remove('spinning');
}

function afterLoad(src) {
  updateCounts(); applyFilter();
  const n = new Date();
  document.getElementById('last-upd').textContent =
    (n.getMonth()+1)+'/'+n.getDate()+' '+n.getHours()+':'+String(n.getMinutes()).padStart(2,'0')+' 更新'+(src==='cache'?' (缓存)':'');
  if (src==='cache') toast('已从缓存加载（2小时内）');
}

// ── Filter & render ──────────────────────────────────────
function applyFilter() {
  const q = qStr.toLowerCase();
  filtered = all.filter(a => {
    if (curArea !== 'all' && a.area !== curArea) return false;
    if (a.type === 'review'    && !types.review)    return false;
    if (a.type === 'original'  && !types.original)  return false;
    if (a.type === 'extension' && !types.extension) return false;
    if (extras.code   && !a.hasCode) return false;
    if (extras.recent && !a.recent)  return false;
    if (q && !a.title.toLowerCase().includes(q) &&
        !a.journal.toLowerCase().includes(q) &&
        !a.tag.toLowerCase().includes(q)) return false;
    return true;
  });
  pg = 1; render();
  setStat(
    '显示 ' + filtered.length + ' 篇（共 ' + all.length + ' 篇 QSP 模型）',
    filtered.length + ' 篇',
    new Date().toLocaleDateString('zh-CN')
  );
}

function render() {
  const grid  = document.getElementById('grid');
  const start = (pg-1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const total = Math.ceil(filtered.length / PAGE_SIZE);

  if (!slice.length) {
    grid.innerHTML = '<div class="state-box">没有符合条件的文献</div>';
    document.getElementById('pager').style.display = 'none';
    return;
  }
  grid.innerHTML = slice.map(mkCard).join('');

  const pager = document.getElementById('pager');
  if (total > 1) {
    pager.style.display = 'flex';
    document.getElementById('pg-inf').textContent = '第 ' + pg + ' / ' + total + ' 页';
    document.getElementById('pb-prev').disabled = (pg === 1);
    document.getElementById('pb-next').disabled = (pg === total);
  } else { pager.style.display = 'none'; }
}

function mkCard(a) {
  const dc = {low:'b-easy',medium:'b-med',high:'b-hard'}[a.diff] || 'b-med';
  const dl = {low:'易复现',medium:'复现中等',high:'复现难'}[a.diff] || '中等';
  const tl = {original:'原创',extension:'扩展',review:'综述'}[a.type] || a.type;
  const doi = a.doi
    ? '<a href="https://doi.org/'+a.doi+'" target="_blank">'+a.doi.substring(0,42)+'</a>'
    : 'PMID ' + a.pmid;
  return '<div class="card'+(a.recent?' new-card':'')+'">'
    + '<div class="card-top"><div class="card-tags">'
    + (a.recent ? '<span class="tag t-new">近两周</span>' : '')
    + '<span class="tag t-'+a.area+'">'+a.tag+'</span>'
    + (a.type==='review' ? '<span class="tag t-review">综述</span>' : '')
    + (a.hasCode ? '<span class="tag t-code">代码公开</span>' : '')
    + '</div><div class="card-meta">'+a.year+' · '+a.journal.substring(0,26)+'</div></div>'
    + '<div class="card-title"><a href="https://pubmed.ncbi.nlm.nih.gov/'+a.pmid+'/" target="_blank">'+a.title+'</a></div>'
    + '<div class="card-bot"><div class="card-doi">'+doi+'</div>'
    + '<span class="badge '+dc+'">'+dl+'</span>'
    + '<span class="badge b-blue">'+tl+'</span>'
    + '</div></div>';
}

// ── UI controls ──────────────────────────────────────────
function setArea(a) {
  curArea = a;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-area="'+a+'"]')?.classList.add('active');
  applyFilter();
}
function toggleType(t) {
  types[t] = !types[t];
  const el = document.getElementById('k-'+t);
  el.classList.toggle('on', types[t]);
  el.querySelector('.chk-box').textContent = types[t] ? '✓' : '';
  applyFilter();
}
function toggleX(k) {
  extras[k] = !extras[k];
  const el = document.getElementById('k-'+k);
  el.classList.toggle('on', extras[k]);
  el.querySelector('.chk-box').textContent = extras[k] ? '✓' : '';
  applyFilter();
}
function doSearch() { qStr = document.getElementById('q').value; applyFilter(); }
function flip(d) {
  pg = Math.max(1, Math.min(Math.ceil(filtered.length/PAGE_SIZE), pg+d));
  render(); window.scrollTo(0,0);
}
function setStat(t,n,d) {
  document.getElementById('st-txt').textContent = t;
  document.getElementById('st-n').textContent   = n;
  document.getElementById('st-d').textContent   = d;
}
function updateCounts() {
  ['all','oncology','autoimmune','metabolic','cardio','neuro','renal','infectious','other'].forEach(a => {
    const el = document.getElementById('c-'+a);
    if (el) el.textContent = a==='all' ? all.length : all.filter(x=>x.area===a).length;
  });
}
function showSpinner() {
  document.getElementById('grid').innerHTML =
    '<div class="state-box"><div class="spinner"></div><div>正在从 PubMed 检索 QSP 模型…</div>'
    + '<div class="prog"><div class="prog-f" id="prog-f"></div></div></div>';
  document.getElementById('pager').style.display = 'none';
}
function setP(pct) { const el = document.getElementById('prog-f'); if(el) el.style.width = pct+'%'; }
function subscribe() {
  const em = document.getElementById('sub-em').value.trim();
  const st = document.getElementById('sub-st');
  if (!em.includes('@')) { st.textContent='请输入有效邮箱'; st.style.color='#f87171'; return; }
  const subs = JSON.parse(localStorage.getItem('qsp_subs')||'[]');
  if (!subs.includes(em)) { subs.push(em); localStorage.setItem('qsp_subs', JSON.stringify(subs)); }
  st.textContent='✓ 已记录'; st.style.color='var(--accent)';
  document.getElementById('sub-em').value='';
  toast('✓ 邮箱已记录，配合 GitHub Actions 每日自动通知');
}
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), 3000);
}
function saveCache(d) { try { localStorage.setItem('qsp_d', JSON.stringify(d.slice(0,300))); localStorage.setItem('qsp_t', Date.now()); } catch(e){} }
function getCache()   { try { const ts=parseInt(localStorage.getItem('qsp_t')||'0'); if(Date.now()-ts>CACHE_MS) return null; const d=localStorage.getItem('qsp_d'); return d?JSON.parse(d):null; } catch(e){ return null; } }

load();
</script>
